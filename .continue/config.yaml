name: Holy AI Engineering System
version: 1.0.0
schema: v1

models:
  - name: GPT41
    provider: openai
    model: gpt-4.1
    roles:
      - chat
      - summarize
    capabilities:
      - tool_use

  - name: CODEX
    provider: openai
    model: gpt-5.2-codex
    roles:
      - edit
      - apply
      - chat
    capabilities:
      - tool_use

context:
  - provider: file
  - provider: code
  - provider: diff
  - provider: terminal
  - provider: docs
  - provider: folder

rules:
  - file://.continue/rules/CONTINUE.md
  - file://.continue/rules/language-rules.md
  - file://.continue/rules/architecture-rules.md
  - file://.continue/rules/coding-standards.md
  - file://.continue/rules/orchestrator-rules.md
  - file://.continue/rules/recovery-layer.md
  - file://.continue/rules/no-hallucination.md

prompts:
  - uses: file://.continue/prompts/engineering-prompts.md

docs:
  - name: Continue Docs
    startUrl: https://docs.continue.dev

data:
  - name: local-events
    destination: file://.continue/logs
    schema: 0.2.0